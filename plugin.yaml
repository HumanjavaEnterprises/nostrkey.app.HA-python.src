name: nostrkey
version: 0.1.0
description: "Give your Hermes Agent its own Nostr identity. Generate keypairs, sign events, encrypt data, and back up identities — all on the open Nostr protocol. Mirrors the OpenClaw nostrkey SDK; same crypto, same wire format, same npub. Five tools: generate, whoami, save, load, sign_event."
author: Humanjava Enterprises
kind: backend
platforms:
  - linux
  - macos
provides_tools:
  - nostrkey_generate
  - nostrkey_whoami
  - nostrkey_save
  - nostrkey_load
  - nostrkey_sign_event
